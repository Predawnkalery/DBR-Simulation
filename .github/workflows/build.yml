name: Compile DBR Simulator

# This tells GitHub to run the script every time you push code to the main branch
on:
  push:
    branches: [ "main", "master" ]
  workflow_dispatch: # This adds a button on GitHub to run it manually

jobs:
  build:
    name: Build on ${{ matrix.os }}
    # This matrix is the magic part: it spins up three separate VMs simultaneously
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11' 

    - name: Install Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install pyinstaller

    - name: Fetch Offline Assets & Database
      run: python make_offline.py

    - name: Build Executable via PyInstaller
      run: python build_app.py

    - name: Upload Compiled Application
      uses: actions/upload-artifact@v4
      with:
        # Names the zip file based on the OS it was built on
        name: DBR_Simulator-${{ matrix.os }}
        # Tells GitHub to grab the output folder generated by PyInstaller
        path: dist/